<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Chi Tiêu - Đăng Nhập / Đăng Ký</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div id="alertContainer"></div>

      <!-- Login Form -->
      <div id="loginForm" class="auth-form">
        <h2 style="text-align: center; margin-bottom: 30px; color: #333;">
          <i class="bi bi-wallet"></i> Quản Lý Chi Tiêu
        </h2>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Nhập email" required>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">Đăng Nhập</button>

        <div class="form-footer">
          Chưa có tài khoản?
          <a onclick="toggleAuthForm()">Đăng ký ngay</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="auth-form hidden">
        <h2 style="text-align: center; margin-bottom: 30px; color: #333;">
          <i class="bi bi-person-plus"></i> Tạo Tài Khoản
        </h2>

        <div class="form-group">
          <label>Tên người dùng</label>
          <input type="text" id="regUsername" placeholder="Nhập tên người dùng" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="Nhập email" required>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="regPassword" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" required>
        </div>

        <button class="btn btn-primary" onclick="handleRegister()">Đăng Ký</button>

        <div class="form-footer">
          Đã có tài khoản?
          <a onclick="toggleAuthForm()">Đăng nhập</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
