<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Quản Lý Chi Tiêu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="dashboard-container">
      <!-- Header -->
      <div class="dashboard-header">
        <h1><i class="bi bi-wallet2"></i> Quản Lý Chi Tiêu</h1>
        <div class="user-menu">
          <span id="userInfo"></span>
          <button onclick="handleLogout()"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</button>
        </div>
      </div>

      <!-- Alert Container -->
      <div id="alertContainer"></div>

      <!-- Navigation Tabs -->
      <div class="nav-tabs">
        <button class="nav-tab-btn active" onclick="switchTab('overview')">
          <i class="bi bi-graph-up"></i> Tổng Quan
        </button>
        <button class="nav-tab-btn" onclick="switchTab('wallets')">
          <i class="bi bi-wallet"></i> Ví Tiền
        </button>
        <button class="nav-tab-btn" onclick="switchTab('transactions')">
          <i class="bi bi-arrow-left-right"></i> Giao Dịch
        </button>
        <button class="nav-tab-btn" onclick="switchTab('categories')">
          <i class="bi bi-tag"></i> Danh Mục
        </button>
      </div>

      <!-- OVERVIEW TAB -->
      <div id="overview" class="tab-content">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Tổng Số Dư</div>
            <div class="stat-value" id="totalBalance">0 ₫</div>
          </div>
          <div class="stat-card" style="background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);">
            <div class="stat-label">Thu Nhập</div>
            <div class="stat-value" id="totalIncome">0 ₫</div>
          </div>
          <div class="stat-card" style="background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);">
            <div class="stat-label">Chi Tiêu</div>
            <div class="stat-value" id="totalExpense">0 ₫</div>
          </div>
        </div>

        <!-- Wallets Info -->
        <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
          <h3 style="margin-bottom: 20px;"><i class="bi bi-wallet"></i> Các Ví Tiền</h3>
          <div id="walletsOverview"></div>
          <button class="btn btn-success" onclick="openModal('addWalletModal')" style="margin-top: 15px;">
            <i class="bi bi-plus-circle"></i> Thêm Ví Mới
          </button>
        </div>

        <!-- Charts -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
          <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0;">
            <h3 style="margin-bottom: 20px;">Chi Tiêu Theo Danh Mục</h3>
            <canvas id="categoryChart"></canvas>
          </div>
          <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0;">
            <h3 style="margin-bottom: 20px;">Thu vs Chi</h3>
            <canvas id="incomeExpenseChart"></canvas>
          </div>
        </div>
      </div>

      <!-- WALLETS TAB -->
      <div id="wallets" class="tab-content hidden">
        <div style="margin-bottom: 20px;">
          <button class="btn btn-success" onclick="openModal('addWalletModal')">
            <i class="bi bi-plus-circle"></i> Thêm Ví Mới
          </button>
        </div>
        <div id="walletsList"></div>
      </div>

      <!-- TRANSACTIONS TAB -->
      <div id="transactions" class="tab-content hidden">
        <div style="margin-bottom: 20px;">
          <button class="btn btn-success" onclick="openModal('addTransactionModal')">
            <i class="bi bi-plus-circle"></i> Thêm Giao Dịch
          </button>
        </div>
        
        <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div class="form-group">
              <label>Loại giao dịch</label>
              <select id="filterType" onchange="loadTransactions()" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="">Tất cả</option>
                <option value="income">Thu nhập</option>
                <option value="expense">Chi tiêu</option>
              </select>
            </div>
            <div class="form-group">
              <label>Ví</label>
              <select id="filterWallet" onchange="loadTransactions()" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="">Tất cả ví</option>
              </select>
            </div>
            <div class="form-group">
              <label>Từ ngày</label>
              <input type="date" id="filterStartDate" onchange="loadTransactions()" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div class="form-group">
              <label>Đến ngày</label>
              <input type="date" id="filterEndDate" onchange="loadTransactions()" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Tiêu đề</th>
                <th>Loại</th>
                <th>Danh mục</th>
                <th>Ví</th>
                <th>Số tiền</th>
                <th>Ngày</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="transactionsList"></tbody>
          </table>
        </div>
      </div>

      <!-- CATEGORIES TAB -->
      <div id="categories" class="tab-content hidden">
        <div style="margin-bottom: 20px;">
          <button class="btn btn-success" onclick="openModal('addCategoryModal')">
            <i class="bi bi-plus-circle"></i> Thêm Danh Mục
          </button>
        </div>
        <div id="categoriesList"></div>
      </div>
    </div>
  </div>

  <!-- ADD WALLET MODAL -->
  <div id="addWalletModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Thêm Ví Mới</h2>
        <button class="close-modal" onclick="closeModal('addWalletModal')">×</button>
      </div>
      <div class="form-group">
        <label>Tên ví</label>
        <input type="text" id="walletName" placeholder="Ví chính, Ví tiết kiệm, ...">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addWalletModal')">Hủy</button>
        <button class="btn btn-primary" onclick="createWallet()">Tạo</button>
      </div>
    </div>
  </div>

  <!-- ADD TRANSACTION MODAL -->
  <div id="addTransactionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Thêm Giao Dịch</h2>
        <button class="close-modal" onclick="closeModal('addTransactionModal')">×</button>
      </div>
      <div class="form-group">
        <label>Tiêu đề</label>
        <input type="text" id="transTitle" placeholder="Ví dụ: Mua sắm, Ăn cơm, ...">
      </div>
      <div class="form-group">
        <label>Loại</label>
        <select id="transType" onchange="updateCategories()">
          <option value="">-- Chọn loại --</option>
          <option value="income">Thu nhập</option>
          <option value="expense">Chi tiêu</option>
        </select>
      </div>
      <div class="form-group">
        <label>Danh mục</label>
        <select id="transCategoryId">
          <option value="">-- Chọn danh mục --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ví</label>
        <select id="transWalletId">
          <option value="">-- Chọn ví --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Số tiền</label>
        <input type="number" id="transAmount" placeholder="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Ngày</label>
        <input type="date" id="transDate">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addTransactionModal')">Hủy</button>
        <button class="btn btn-primary" onclick="createTransaction()">Tạo</button>
      </div>
    </div>
  </div>

  <!-- ADD CATEGORY MODAL -->
  <div id="addCategoryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Thêm Danh Mục</h2>
        <button class="close-modal" onclick="closeModal('addCategoryModal')">×</button>
      </div>
      <div class="form-group">
        <label>Tên danh mục</label>
        <input type="text" id="categoryName" placeholder="Ví dụ: Ăn uống">
      </div>
      <div class="form-group">
        <label>Loại</label>
        <select id="categoryType">
          <option value="">-- Chọn loại --</option>
          <option value="income">Thu nhập</option>
          <option value="expense">Chi tiêu</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nhóm</label>
        <select id="categoryGroup">
          <option value="">-- Chọn nhóm --</option>
          <option value="Chi tiêu sinh hoạt">Chi tiêu sinh hoạt</option>
          <option value="Chi phí phát sinh">Chi phí phát sinh</option>
          <option value="Chi phí cố định">Chi phí cố định</option>
          <option value="Thu nhập">Thu nhập</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addCategoryModal')">Hủy</button>
        <button class="btn btn-primary" onclick="createCategory()">Tạo</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
